    /* ─── UI Components ─── */
    function Button({ children, variant = "primary", size = "md", className = "", onClick, disabled, type = "button" }) {
      const base = "inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer";
      const v = { primary:"bg-gradient-to-l from-violet-600 to-blue-600 text-white hover:from-violet-700 hover:to-blue-700 focus:ring-blue-500 shadow-lg shadow-blue-500/25", secondary:"bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 hover:border-gray-300 focus:ring-gray-300 shadow-sm", ghost:"text-gray-600 hover:bg-gray-100 hover:text-gray-900", outline:"border-2 border-blue-500 text-blue-600 hover:bg-blue-50 focus:ring-blue-500", danger:"bg-red-50 text-red-600 hover:bg-red-100 focus:ring-red-500" };
      const sz = { sm:"px-3 py-1.5 text-sm", md:"px-5 py-2.5 text-sm", lg:"px-8 py-3.5 text-base", xl:"px-10 py-4 text-lg" };
      return <button type={type} className={`${base} ${v[variant]} ${sz[size]} ${className}`} onClick={onClick} disabled={disabled}>{children}</button>;

            <Card className="p-6"><h3 className="font-bold text-gray-900 mb-3 flex items-center gap-2"><Icon name="layers" size={18} className="text-blue-600"/>المجالات</h3><div className="flex flex-wrap gap-2">{domainNames.map(name=><Badge key={name} variant="purple">{name}</Badge>)}</div></Card>
          </div>
          <Card className="p-6 mb-10"><h3 className="font-bold text-gray-900 mb-4">الوسوم</h3><div className="flex flex-wrap gap-2">{resource.tags.map(tag=><span key={tag} className="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg text-sm hover:bg-blue-50 hover:text-blue-600 transition-colors cursor-pointer">#{tag}</span>)}</div></Card>
          {relatedResources.length > 0 && (<div><h3 className="text-xl font-bold text-gray-900 mb-6">موارد مشابهة</h3><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">{relatedResources.map(r=><ResourceCard key={r.id} resource={r}/>)}</div></div>)}
        </div>

    /* ─── Wizard Page ─── */
    function WizardPage({ setCurrentPage }) {
      const [step, setStep] = useState(1);
      const [selections, setSelections] = useState({ goal:"", domain:"", level:"", price:"" });
      const totalSteps = 5;
      const canProceed = ()=>{
        if(step===1) return !!selections.goal;
        if(step===2) return !!selections.domain;
        if(step===3) return !!selections.level;
        if(step===4) return !!selections.price;
        return true;
      };
      const handleNext = ()=>{
        if(step<totalSteps && canProceed()) setStep(step+1);
        if(step===totalSteps){
          setCurrentPage("/results");
          window._wizardState = selections;
        }
      };
      const updateSelection = (key, value) => setSelections(prev=>({...prev,[key]:value}));
      const selectionLabels = {
        goal: GOALS.find(g=>g.id===selections.goal)?.name,
        domain: DOMAINS.find(d=>d.id===selections.domain)?.name,
        level: LEVELS.find(l=>l.id===selections.level)?.name,
        price: PRICE_PREFERENCES.find(p=>p.id===selections.price)?.name,
      };
      return (
        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
          <div className="text-center mb-10"><h1 className="text-3xl font-bold text-gray-900 mb-2">معالج التوصية</h1><p className="text-gray-500">أجب على بعض الأسئلة البسيطة لنوصي لك بالموارد المناسبة</p></div>
          <div className="mb-10 max-w-lg mx-auto">
            <ProgressBar current={step} total={totalSteps}/>
            <div className="flex justify-between mt-4">
              {["الهدف","المجال","المستوى","السعر","النتائج"].map((label,i)=>(
                <div key={label} className="flex flex-col items-center">
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all ${i+1<step?"bg-blue-600 text-white":i+1===step?"bg-gradient-to-br from-blue-600 to-violet-600 text-white shadow-lg shadow-blue-500/25":"bg-gray-100 text-gray-400"}`}>{i+1<step?<Icon name="check" size={14}/>:i+1}</div>
                  <span className={`text-xs mt-1 ${i+1<=step?"text-gray-900 font-medium":"text-gray-400"}`}>{label}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="bg-white rounded-3xl border border-gray-100 shadow-sm p-8 mb-8">
            {step===1 && (<div><h2 className="text-xl font-bold text-gray-900 mb-2">اختر هدفك</h2><p className="text-gray-500 mb-6">ما هو هدفك الرئيسي حالياً؟</p><div className="grid grid-cols-1 sm:grid-cols-3 gap-4">{GOALS.map(goal=>(<div key={goal.id} className={`p-6 rounded-2xl border-2 cursor-pointer transition-all text-center ${selections.goal===goal.id?"border-blue-500 bg-blue-50 shadow-lg shadow-blue-500/10":"border-gray-100 hover:border-gray-200 hover:bg-gray-50"}`} onClick={()=>updateSelection("goal",goal.id)}><div className={`w-14 h-14 mx-auto mb-4 rounded-2xl flex items-center justify-center transition-colors ${selections.goal===goal.id?"bg-gradient-to-br from-blue-500 to-violet-500":"bg-gray-100"}`}><Icon name={goal.icon} size={24} className={selections.goal===goal.id?"text-white":"text-gray-400"}/></div><h3 className="font-bold text-gray-900 mb-1">{goal.name}</h3><p className="text-xs text-gray-500">{goal.description}</p></div>))}</div></div>)}
            {step===2 && (<div><h2 className="text-xl font-bold text-gray-900 mb-2">اختر مجالك</h2><p className="text-gray-500 mb-6">في أي مجال تريد التركيز؟</p><div className="grid grid-cols-2 sm:grid-cols-3 gap-3">{DOMAINS.map(domain=>(<div key={domain.id} className={`p-4 rounded-2xl border-2 cursor-pointer transition-all text-center ${selections.domain===domain.id?"border-blue-500 bg-blue-50":"border-gray-100 hover:border-gray-200 hover:bg-gray-50"}`} onClick={()=>updateSelection("domain",domain.id)}><h3 className="font-semibold text-gray-900 text-sm">{domain.name}</h3></div>))}</div></div>)}
            {step===3 && (<div><h2 className="text-xl font-bold text-gray-900 mb-2">حدد مستواك</h2><p className="text-gray-500 mb-6">ما هو مستواك الحالي في هذا المجال؟</p><div className="grid grid-cols-1 sm:grid-cols-3 gap-4">{LEVELS.map(level=>(<div key={level.id} className={`p-6 rounded-2xl border-2 cursor-pointer transition-all text-center ${selections.level===level.id?"border-blue-500 bg-blue-50 shadow-lg shadow-blue-500/10":"border-gray-100 hover:border-gray-200 hover:bg-gray-50"}`} onClick={()=>updateSelection("level",level.id)}><h3 className="font-bold text-gray-900 mb-1">{level.name}</h3><p className="text-xs text-gray-500">{level.description}</p></div>))}</div></div>)}
            {step===4 && (<div><h2 className="text-xl font-bold text-gray-900 mb-2">اختر تفضيل السعر</h2><p className="text-gray-500 mb-6">ما هو نطاق السعر المناسب لك؟</p><div className="grid grid-cols-1 sm:grid-cols-2 gap-4">{PRICE_PREFERENCES.map(pref=>(<div key={pref.id} className={`p-6 rounded-2xl border-2 cursor-pointer transition-all ${selections.price===pref.id?"border-blue-500 bg-blue-50 shadow-lg shadow-blue-500/10":"border-gray-100 hover:border-gray-200 hover:bg-gray-50"}`} onClick={()=>updateSelection("price",pref.id)}><h3 className="font-bold text-gray-900 mb-1">{pref.name}</h3><p className="text-xs text-gray-500">{pref.description}</p></div>))}</div></div>)}
            {step===5 && (<div><h2 className="text-xl font-bold text-gray-900 mb-2">مراجعة اختياراتك</h2><p className="text-gray-500 mb-6">تأكد من اختياراتك قبل عرض النتائج</p><div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">{[{label:"الهدف",value:selectionLabels.goal},{label:"المجال",value:selectionLabels.domain},{label:"المستوى",value:selectionLabels.level},{label:"السعر",value:selectionLabels.price}].map(item=>(<div key={item.label} className="bg-gray-50 rounded-xl p-4"><span className="text-sm text-gray-500">{item.label}</span><p className="font-semibold text-gray-900 mt-1">{item.value}</p></div>))}</div></div>)}
          </div>
          <div className="flex items-center justify-between">
            <Button variant="secondary" size="lg" onClick={()=>{if(step>1)setStep(step-1)}} disabled={step===1}><Icon name="arrowRight" size={18} className="ml-2"/>السابق</Button>
            <Button variant="primary" size="lg" onClick={handleNext} disabled={!canProceed()&&step<5}>{step===totalSteps?"عرض النتائج":"التالي"}{step<totalSteps&&<Icon name="arrowLeft" size={18} className="mr-2"/>}</Button>
          </div>
        </div>
      );
    }

    /* ─── Results Page ─── */
    function ResultsPage({ setCurrentPage }) {
      const { favorites, toggleFavorite } = useApp();
      const selections = window._wizardState || {};
      const getRecommendations = useCallback(()=>{
        if(!selections.goal) return [];
        const {goal,domain,level,price} = selections;
        const levelIdx = LEVEL_MAP[level]??1;
        return MOCK_RESOURCES.map(resource=>{
          let score=0; let reasons=[];
          if(goal && resource.goals.includes(goal)){score+=30;reasons.push("يطابق هدفك");}
          if(domain && resource.domains.includes(domain)){score+=25;reasons.push("في مجال اختيارك");}
          if(level){const ri=LEVEL_MAP[resource.level]??1;const ld=Math.abs(ri-levelIdx);if(ld===0){score+=20;reasons.push("مناسب لمستواك");}else if(ld===1){score+=10;reasons.push("قريب من مستواك");}}
          if(price && price!=="any"){if(price==="free"&&resource.pricing===0){score+=25;reasons.push("مجاني");}else if(price==="freemium"&&(resource.pricing===0||resource.pricing===1)){score+=20;reasons.push("يحتوي على خطة مجانية");}else if(price==="paid"&&resource.pricing===2){score+=25;reasons.push("أداة احترافية مدفوعة");}else if(price==="any"){score+=10;}}
          return {resource,matchPercent:Math.min(Math.round(score),100),reasons};
        }).filter(r=>r.matchPercent>0).sort((a,b)=>b.matchPercent-a.matchPercent);
      },[selections]);
      const recommendations = getRecommendations();
      if(!selections.goal){
        return <div className="max-w-7xl mx-auto px-4 py-20 text-center"><h2 className="text-2xl font-bold text-gray-900 mb-4">يرجى إكمال معالج التوصية أولاً</h2><Button onClick={()=>setCurrentPage("/wizard")}>ابدأ التوصية</Button></div>;
      }
      return (
        <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
          <div className="text-center mb-10"><div className="inline-flex items-center gap-2 bg-gradient-to-l from-violet-100 to-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-medium mb-4"><Icon name="sparkle" size={16}/>نتائج التوصية</div><h1 className="text-3xl font-bold text-gray-900 mb-2">مواردك الموصى بها</h1><p className="text-gray-500">بناءً على اختياراتك، إليك أفضل الموارد المناسبة لك</p></div>
          <Card className="p-6 mb-10 bg-gradient-to-bl from-blue-50 to-violet-50 border-blue-100">
            <h3 className="font-bold text-gray-900 mb-4 flex items-center gap-2"><Icon name="clipboard" size={18} className="text-blue-600"/>ملخص اختياراتك</h3>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">{[{label:"الهدف",value:GOALS.find(g=>g.id===selections.goal)?.name},{label:"المجال",value:DOMAINS.find(d=>d.id===selections.domain)?.name},{label:"المستوى",value:LEVELS.find(l=>l.id===selections.level)?.name},{label:"السعر",value:PRICE_PREFERENCES.find(p=>p.id===selections.price)?.name}].map(item=>(<div key={item.label} className="bg-white rounded-xl p-3"><span className="text-xs text-gray-500">{item.label}</span><p className="font-semibold text-gray-900 text-sm mt-0.5">{item.value}</p></div>))}</div>
          </Card>
          <div className="mb-16">
            <h2 className="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2"><Icon name="star" size={20} className="text-yellow-500"/>التوصيات مرتبة حسب التطابق</h2>
            <div className="space-y-4">
              {recommendations.map(({resource,matchPercent,reasons})=>{
                const isFavorite=favorites.includes(resource.id);
                return (
                  <Card key={resource.id} hover className="p-6">
                    <div className="flex flex-col sm:flex-row items-start gap-5">
                      <div className="flex-shrink-0"><div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-violet-500 flex items-center justify-center shadow-lg shadow-blue-500/20"><span className="text-white font-bold text-lg">{matchPercent}%</span></div></div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1 flex-wrap"><h3 className="font-bold text-gray-900 text-lg">{resource.name}</h3><Badge variant="primary">{resource.type}</Badge></div>
                        <p className="text-sm text-gray-500 mb-3 line-clamp-1">{resource.description}</p>
                        <div className="flex flex-wrap items-center gap-2 mb-3">{reasons.map((reason,i)=><span key={i} className="text-xs bg-green-50 text-green-700 px-2 py-0.5 rounded-full">✓ {reason}</span>)}</div>
                        <div className="flex flex-wrap gap-2">{resource.tags.slice(0,3).map(tag=><span key={tag} className="text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded">#{tag}</span>)}</div>
                      </div>
                      <div className="flex flex-col gap-2 sm:flex-shrink-0">
                        <Button variant="primary" size="sm" onClick={()=>setCurrentPage(`/resources/${resource.id}`)}>عرض التفاصيل</Button>
                        <Button variant={isFavorite?"danger":"secondary"} size="sm" onClick={()=>toggleFavorite(resource.id)}><Icon name={isFavorite?"heartFilled":"heart"} size={14} className="ml-1"/>{isFavorite?"إزالة":"حفظ"}</Button>
                      </div>
                    </div>
                  </Card>
                );
              })}
            </div>
          </div>
          <div className="mb-10">
            <h2 className="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2"><Icon name="clipboard" size={20} className="text-blue-600"/>خطة عملية مقترحة</h2>
            <div className="space-y-4">
              {ACTION_PLAN_STEPS.map((planStep,index)=>{
                const suggestedResource=planStep.suggestedResources.map(id=>recommendations.find(r=>r.resource.id===id)).filter(Boolean).map(r=>r.resource);
                return (
                  <Card key={index} className="p-6">
                    <div className="flex items-start gap-4">
                      <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-violet-600 rounded-xl flex items-center justify-center flex-shrink-0 shadow-md shadow-blue-500/20"><span className="text-white font-bold">{planStep.step}</span></div>
                      <div className="flex-1"><h3 className="font-bold text-gray-900 mb-1">{planStep.title}</h3><p className="text-sm text-gray-500 mb-3">{planStep.description}</p>{suggestedResource.length>0&&<div className="flex items-center gap-2 flex-wrap"><span className="text-xs text-gray-400">موارد مقترحة:</span>{suggestedResource.map(r=><button key={r.id} onClick={()=>setCurrentPage(`/resources/${r.id}`)} className="text-xs bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full hover:bg-blue-100 transition-colors">{r.name}</button>)}</div>}</div>
                    </div>
                  </Card>
                );
              })}
            </div>
          </div>
          <div className="flex flex-col sm:flex-row gap-4 justify-center">
            <Button variant="outline" size="lg" onClick={()=>setCurrentPage("/wizard")}><Icon name="sparkle" size={18} className="ml-2"/>إعادة التوصية</Button>
            <Button variant="primary" size="lg" onClick={()=>setCurrentPage("/resources")}><Icon name="compass" size={18} className="ml-2"/>تصفح جميع الموارد</Button>
          </div>
        </div>
      );
    }

                <Input label="الاسم الكامل" type="text" placeholder="أحمد محمد" value={name} onChange={e=>setName(e.target.value)} className="mb-4"/>
                <Input label="البريد الإلكتروني" type="email" placeholder="example@email.com" value={email} onChange={e=>setEmail(e.target.value)} className="mb-4"/>
                <div className="mb-6"><label className="block text-sm font-medium text-gray-700 mb-1.5">كلمة المرور</label><div className="relative"><input type={showPassword?"text":"password"} placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-white text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all pl-11"/><button type="button" className="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 hover:text-gray-600" onClick={()=>setShowPassword(!showPassword)}><Icon name={showPassword?"eyeOff":"eye"} size={18}/></button></div><p className="text-xs text-gray-400 mt-1.5">يجب أن تكون 8 أحرف على الأقل</p></div>
                <Button variant="primary" type="submit" className="w-full" size="lg">إنشاء الحساب</Button>
              </form>
            </Card>
            <p className="text-center mt-6 text-sm text-gray-500">لديك حساب بالفعل؟ <button onClick={()=>setCurrentPage("/login")} className="text-blue-600 font-medium hover:text-blue-700">تسجيل الدخول</button></p>
          </div>
        </div>
      );
    }

    /* ─── Favorites Page ─── */
    function FavoritesPage({ setCurrentPage }) {
      const { favorites } = useApp();
      const favoriteResources = MOCK_RESOURCES.filter(r=>favorites.includes(r.id));
      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
          <div className="mb-10"><h1 className="text-3xl font-bold text-gray-900 mb-2">الموارد المفضلة</h1><p className="text-gray-500">الموارد التي قمت بحفظها للرجوع إليها لاحقاً</p></div>
          {favoriteResources.length > 0 ? (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">{favoriteResources.map(r=><ResourceCard key={r.id} resource={r}/>)}</div>
          ) : (
            <div className="text-center py-20"><div className="w-24 h-24 bg-gray-100 rounded-3xl flex items-center justify-center mx-auto mb-6"><Icon name="heart" size={40} className="text-gray-300"/></div><h3 className="text-xl font-bold text-gray-900 mb-2">لا توجد موارد محفوظة</h3><p className="text-gray-500 mb-6">ابدأ بحفظ الموارد التي تعجبك للرجوع إليها لاحقاً</p><Button variant="primary" size="lg" onClick={()=>setCurrentPage("/resources")}><Icon name="compass" size={18} className="ml-2"/>استكشف الموارد</Button></div>
          )}
        </div>
      );
    }

    /* ─── My Plans Page ─── */
    function MyPlansPage({ setCurrentPage }) {
      return (
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
          <div className="mb-10"><h1 className="text-3xl font-bold text-gray-900 mb-2">خططي</h1><p className="text-gray-500">الخطط العملية التي قمت بحفظها من نتائج التوصية</p></div>
          <div className="text-center py-20">
            <div className="w-24 h-24 bg-gray-100 rounded-3xl flex items-center justify-center mx-auto mb-6"><Icon name="clipboard" size={40} className="text-gray-300"/></div>
            <h3 className="text-xl font-bold text-gray-900 mb-2">لا توجد خطط محفوظة</h3>
            <p className="text-gray-500 mb-6">أكمل معالج التوصية للحصول على خطة عملية مخصصة لك</p>
            <Button variant="primary" size="lg" onClick={()=>setCurrentPage("/wizard")}><Icon name="sparkle" size={18} className="ml-2"/>ابدأ التوصية الآن</Button>
          </div>
        </div>
      );
    }

    /* ─── Not Found ─── */
    function NotFoundPage({ setCurrentPage }) {
      return (
        <div className="max-w-7xl mx-auto px-4 py-20 text-center">
          <div className="w-24 h-24 bg-gray-100 rounded-3xl flex items-center justify-center mx-auto mb-6"><Icon name="search" size={40} className="text-gray-300"/></div>
          <h2 className="text-2xl font-bold text-gray-900 mb-4">الصفحة غير موجودة</h2>
          <Button onClick={()=>setCurrentPage("/")}>العودة للرئيسية</Button>
        </div>
      );
    }

    /* ─── Main App ─── */
    function App() {
      const [currentPage, setCurrentPage] = useState("/");
      const [favorites, setFavorites] = useState([1, 5]);

      const toggleFavorite = useCallback((id) => {
        setFavorites(prev => prev.includes(id) ? prev.filter(f => f !== id) : [...prev, id]);
      }, []);

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash.replace("#", "") || "/";
          if (hash.startsWith("/resources/")) {
            setCurrentPage(hash);
          }
        };
        window.addEventListener("hashchange", handleHashChange);
        return () => window.removeEventListener("hashchange", handleHashChange);
      }, []);

      const navigate = (path) => {
        window.location.hash = path;
        setCurrentPage(path);
      };

      let page;
      const pagePath = currentPage.startsWith("/resources/") ? "/resources/:id" : currentPage;

      switch(pagePath) {
        case "/": page = <HomePage setCurrentPage={navigate}/>; break;
        case "/resources": page = <ResourcesPage/>; break;
        case "/resources/:id": page = <ResourceDetailsPage setCurrentPage={navigate}/>; break;
        case "/wizard": page = <WizardPage setCurrentPage={navigate}/>; break;
        case "/results": page = <ResultsPage setCurrentPage={navigate}/>; break;
        case "/login": page = <LoginPage setCurrentPage={navigate}/>; break;
        case "/signup": page = <SignupPage setCurrentPage={navigate}/>; break;
        case "/favorites": page = <FavoritesPage setCurrentPage={navigate}/>; break;
        case "/plans": page = <MyPlansPage setCurrentPage={navigate}/>; break;
        default: page = <NotFoundPage setCurrentPage={navigate}/>;
      }

      return (
        <AppContext.Provider value={{ favorites, toggleFavorite }}>
          <div dir="rtl" className="min-h-screen bg-white text-gray-900">
            <Navbar currentPage={currentPage} setCurrentPage={navigate}/>
            <main className="min-h-[calc(100vh-4rem)]">{page}</main>
            <Footer/>
          </div>
        </AppContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
